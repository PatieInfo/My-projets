<!DOCTYPE html>
<html>
  <head>
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <!-- TOP NAVIGATION -->
    <header class="top-nav">
      <div class="top-nav-left">
        <a href="#">About</a>
        <a href="#">Store</a>
      </div>
      <div class="top-nav-right">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
        <div class="grid-icon">⊞</div>
        <a href="#" class="sign-in-btn">Sign in</a>
      </div>
    </header>

    <!-- MAIN CENTER CONTENT -->
    <main class="main-content">

      <!-- GOOGLE LOGO -->
      <div class="logo">
        <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="blue">g</span><span class="green">l</span><span class="red">e</span>
      </div>

      <!-- SEARCH BAR -->
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search Google or type a URL">
        <span class="mic-icon">🎤</span>
      </div>

      <!-- BUTTONS -->
      <div class="search-buttons">
        <button>Google Search</button>
        <button>I'm Feeling Lucky</button>
      </div>

      <!-- LANGUAGE LINE -->
      <p class="language-line">
        Google offered in: <a href="#">Français</a>
      </p>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-left">
        <span>Canada</span>
      </div>
      <div class="footer-center">
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>
      <div class="footer-right">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </footer>

  </body>
</html>
