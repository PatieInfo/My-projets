<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Contacts Manager</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: Arial, sans-serif;
        background: #0a0a1a;
        color: white;
        min-height: 100vh;
        padding: 30px 20px;
      }

      h1 {
        text-align: center;
        font-size: 2em;
        color: #667eea;
        margin-bottom: 8px;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
      }

      .stats {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }

      .stat-card {
        background: #1a1a2e;
        border-radius: 10px;
        padding: 15px 25px;
        text-align: center;
        border: 1px solid #2a2a3e;
      }

      .stat-card .number {
        font-size: 2em;
        font-weight: bold;
        color: #667eea;
      }

      .stat-card .label {
        font-size: 0.8em;
        color: #666;
        margin-top: 4px;
      }

      .main {
        max-width: 900px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      @media (max-width: 600px) {
        .main { grid-template-columns: 1fr; }
      }

      .card {
        background: #1a1a2e;
        border-radius: 12px;
        padding: 25px;
        border: 1px solid #2a2a3e;
      }

      .card h2 {
        color: #667eea;
        margin-bottom: 20px;
        font-size: 1.1em;
      }

      input, select {
        width: 100%;
        padding: 10px 12px;
        background: #12121f;
        border: 1px solid #2a2a3e;
        border-radius: 8px;
        color: white;
        font-size: 0.9em;
        margin-bottom: 10px;
        outline: none;
      }

      input:focus, select:focus {
        border-color: #667eea;
      }

      button {
        width: 100%;
        padding: 11px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.95em;
        font-weight: bold;
        cursor: pointer;
        margin-top: 5px;
        transition: opacity 0.2s;
      }

      button:hover { opacity: 0.85; }

      .search-bar {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      .search-bar input { margin-bottom: 0; }

      .search-bar button {
        width: auto;
        padding: 10px 18px;
        margin-top: 0;
      }

      .contact-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 400px;
        overflow-y: auto;
      }

      .contact-item {
        background: #12121f;
        border-radius: 8px;
        padding: 12px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid #2a2a3e;
        transition: border-color 0.2s;
      }

      .contact-item:hover { border-color: #667eea; }

      .contact-info .name {
        font-weight: bold;
        font-size: 0.95em;
      }

      .contact-info .email {
        font-size: 0.78em;
        color: #666;
        margin-top: 2px;
      }

      .contact-actions {
        display: flex;
        gap: 6px;
      }

      .btn-delete {
        background: #e94560;
        width: auto;
        padding: 5px 12px;
        font-size: 0.8em;
        margin-top: 0;
        border-radius: 6px;
      }

      .category-badge {
        font-size: 0.7em;
        padding: 2px 8px;
        border-radius: 10px;
        margin-top: 3px;
        display: inline-block;
      }

      .cat-artist  { background: #1a3a5c; color: #60a5fa; }
      .cat-client  { background: #1a3a1a; color: #4ade80; }
      .cat-partner { background: #3a2a1a; color: #fb923c; }
      .cat-general { background: #2a2a2a; color: #aaa; }

      .message {
        padding: 10px;
        border-radius: 8px;
        margin-top: 10px;
        font-size: 0.85em;
        text-align: center;
      }

      .message.success { background: #1a3a1a; color: #4ade80; }
      .message.error   { background: #3a1a1a; color: #f87171; }
    </style>
  </head>
  <body>

    <h1>📋 Contacts Manager</h1>
    <p class="subtitle">Powered by Node.js + Express + SQLite</p>

    <div class="stats" id="stats"></div>

    <div class="main">

      <!-- ADD CONTACT -->
      <div class="card">
        <h2>➕ Add New Contact</h2>
        <input type="text"  id="name"     placeholder="Full Name *">
        <input type="email" id="email"    placeholder="Email Address *">
        <input type="text"  id="phone"    placeholder="Phone Number">
        <select id="category">
          <option value="general">General</option>
          <option value="artist">Artist</option>
          <option value="client">Client</option>
          <option value="partner">Partner</option>
        </select>
        <button onclick="addContact()">Add Contact</button>
        <div id="addMessage"></div>
      </div>

      <!-- CONTACTS LIST -->
      <div class="card">
        <h2>👥 All Contacts</h2>
        <div class="search-bar">
          <input type="text" id="search"
            placeholder="Search contacts..."
            oninput="loadContacts()">
          <select id="filterCategory" onchange="loadContacts()"
            style="width:auto; margin-bottom:0">
            <option value="all">All</option>
            <option value="artist">Artists</option>
            <option value="client">Clients</option>
            <option value="partner">Partners</option>
            <option value="general">General</option>
          </select>
        </div>
        <div class="contact-list" id="contactList"></div>
      </div>

    </div>

    <script>
      // Load stats
      async function loadStats() {
        const res  = await fetch("/api/stats");
        const data = await res.json();
        const s    = data.stats;
        document.getElementById("stats").innerHTML = `
          <div class="stat-card">
            <div class="number">${s.total}</div>
            <div class="label">Total</div>
          </div>
          <div class="stat-card">
            <div class="number">${s.artists}</div>
            <div class="label">Artists</div>
          </div>
          <div class="stat-card">
            <div class="number">${s.clients}</div>
            <div class="label">Clients</div>
          </div>
          <div class="stat-card">
            <div class="number">${s.partners}</div>
            <div class="label">Partners</div>
          </div>`;
      }

      // Load contacts
      async function loadContacts() {
        const search   = document.getElementById("search").value;
        const category = document.getElementById("filterCategory").value;
        let url        = `/api/contacts?category=${category}`;
        if (search) url += `&search=${search}`;

        const res  = await fetch(url);
        const data = await res.json();
        const list = document.getElementById("contactList");

        if (data.contacts.length === 0) {
          list.innerHTML = `
            <div style="text-align:center; color:#555; padding:20px">
              No contacts found
            </div>`;
          return;
        }

        list.innerHTML = data.contacts.map(c => `
          <div class="contact-item">
            <div class="contact-info">
              <div class="name">${c.name}</div>
              <div class="email">${c.email}</div>
              <span class="category-badge cat-${c.category}">
                ${c.category}
              </span>
            </div>
            <div class="contact-actions">
              <button class="btn-delete"
                onclick="deleteContact(${c.id}, '${c.name}')">
                Delete
              </button>
            </div>
          </div>
        `).join("");
      }

      // Add contact
      async function addContact() {
        const name     = document.getElementById("name").value.trim();
        const email    = document.getElementById("email").value.trim();
        const phone    = document.getElementById("phone").value.trim();
        const category = document.getElementById("category").value;
        const msgEl    = document.getElementById("addMessage");

        if (!name || !email) {
          msgEl.innerHTML = `
            <div class="message error">Name and email are required!</div>`;
          return;
        }

        const res  = await fetch("/api/contacts", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ name, email, phone, category })
        });

        const data = await res.json();

        if (data.success) {
          msgEl.innerHTML = `
            <div class="message success">✅ ${name} added!</div>`;
          document.getElementById("name").value  = "";
          document.getElementById("email").value = "";
          document.getElementById("phone").value = "";
          loadContacts();
          loadStats();
        } else {
          msgEl.innerHTML = `
            <div class="message error">❌ ${data.error}</div>`;
        }

        setTimeout(() => msgEl.innerHTML = "", 3000);
      }

      // Delete contact
      async function deleteContact(id, name) {
        if (!confirm(`Delete ${name}?`)) return;

        const res  = await fetch(`/api/contacts/${id}`, {
          method: "DELETE"
        });
        const data = await res.json();

        if (data.success) {
          loadContacts();
          loadStats();
        }
      }

      // Initialize
      loadStats();
      loadContacts();
    </script>

  </body>
</html>
