<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Soccer Live App</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app">

      <!-- HEADER -->
      <header class="header">
        <div class="header-left">
          <span class="logo">⚽ Soccer Live</span>
          <span class="season">All Competitions</span>
        </div>
        <div class="header-right">
          <span class="live-dot"></span>
          <span class="live-text">LIVE DATA</span>
        </div>
      </header>

      <!-- NAVIGATION TABS -->
      <nav class="tabs">
        <button class="tab active" onclick="switchTab('scores', this)">
          🗓️ Scores
        </button>
        <button class="tab" onclick="switchTab('live', this)">
          🔴 Live
        </button>
        <button class="tab" onclick="switchTab('tournaments', this)">
          🏆 Tournaments
        </button>
      </nav>

      <!-- LOADING -->
      <div class="loading hidden" id="loading">
        <div class="spinner"></div>
        <p>Loading football data...</p>
      </div>

      <!-- ERROR -->
      <div class="error hidden" id="errorMsg"></div>

      <!-- SCORES TAB -->
      <div class="tab-content" id="scoresTab">
        <div class="date-nav">
          <button onclick="changeDate(-1)">← Prev</button>
          <span id="currentDate"></span>
          <button onclick="changeDate(1)">Next →</button>
        </div>
        <div class="search-bar">
          <input
            type="text"
            id="teamSearch"
            placeholder="Filter by team or tournament..."
            oninput="filterGames()"
          >
        </div>
        <div id="gamesList" class="games-list"></div>
      </div>

      <!-- LIVE TAB -->
      <div class="tab-content hidden" id="liveTab">
        <div class="live-header">
          <span>🔴 Games happening right now</span>
          <button class="refresh-btn" onclick="loadLiveGames()">↻ Refresh</button>
        </div>
        <div id="liveList" class="games-list"></div>
      </div>

      <!-- TOURNAMENTS TAB -->
      <div class="tab-content hidden" id="tournamentsTab">
        <div id="tournamentsList" class="tournaments-list"></div>
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
