<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div class="container">

      <div class="header">
        <h1>My To-Do List</h1>
        <p class="date" id="date"></p>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="taskInput"
          placeholder="Add a new task..."
          onkeypress="handleKeyPress(event)"
        >
        <button onclick="addTask()">Add</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" onclick="filterTasks('all', this)">All</button>
        <button class="filter-btn" onclick="filterTasks('active', this)">Active</button>
        <button class="filter-btn" onclick="filterTasks('completed', this)">Completed</button>
      </div>

      <ul id="taskList"></ul>

      <div class="footer">
        <span id="remaining">0 tasks remaining</span>
        <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
      </div>

    </div>

    <script src="script.js"></script>
  </body>
</html>
